<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<title>Peel it! - Sticker art ASMR</title>
<meta name="description" content="A satisfying ASMR sticker peel-and-place hypercasual game.">
<meta name="theme-color" content="#241b2e">
<!-- Inline SVG favicon: keeps the entry HTML asset-free and avoids a 404 on
     /favicon.ico. A peeling pink sticker corner. -->
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect x='4' y='4' width='24' height='24' rx='6' fill='%23ff8fb3'/%3E%3Cpath d='M28 20v2a6 6 0 0 1-6 6h-2z' fill='%23fffaf3'/%3E%3Cpath d='M20 28l8-8a8 8 0 0 1-8 8z' fill='%23b79cff'/%3E%3C/svg%3E">
<!--
  Playgama Bridge SDK - required for submission (game_ready event + progress
  save/load + rewarded/interstitial ads). Loaded as a plain script BEFORE the
  app bundle so window.bridge exists (or doesn't) by the time sdk.js's platform
  detection runs. On any other host (a plain file open, GitHub Pages, Vercel,
  or no internet) this request simply fails and the game falls back to the
  plain "web" adapter with zero effect on gameplay - see src/sdk.js.
-->
<script src="https://bridge.playgama.com/v1/stable/playgama-bridge.js"></script>
</head>
<body>
  <div id="stage">
    <div id="frame">
      <canvas id="game-canvas"></canvas>

      <div id="top-bar">
        <button id="back-btn" class="icon-btn" aria-label="Back to levels">←</button>
        <div id="level-name">Level</div>
        <div class="top-bar-right">
          <canvas id="ref-thumb" width="132" height="132" aria-label="Picture you're building"></canvas>
          <button id="hint-btn" class="icon-btn hint-btn" aria-label="Get a hint">
            <span class="hint-glyph">💡</span>
            <span id="hint-badge" class="ad-badge">AD</span>
          </button>
          <button id="mute-btn" class="icon-btn" aria-label="Mute">🔊</button>
        </div>
      </div>

      <div id="screen-select" class="screen">
        <div class="screen-inner">
          <div class="select-head">
            <div class="select-titles">
              <h1 class="title">peel it!</h1>
              <p class="subtitle">sticker art asmr</p>
            </div>
            <button id="album-btn" class="chip-btn" aria-label="Open sticker album">
              <span class="chip-glyph">📖</span>
              <span class="chip-label">Album</span>
            </button>
          </div>
          <div id="level-grid" class="level-grid"></div>
        </div>
      </div>

      <div id="screen-album" class="screen">
        <div class="screen-inner">
          <div class="select-head">
            <div class="select-titles">
              <h1 class="title album-title">Album</h1>
              <p class="subtitle" id="album-progress">0 / 12 collected</p>
            </div>
            <button id="album-back-btn" class="chip-btn" aria-label="Back to levels">
              <span class="chip-glyph">←</span>
              <span class="chip-label">Back</span>
            </button>
          </div>
          <div id="album-grid" class="album-grid"></div>
        </div>
      </div>

      <div id="screen-complete" class="screen">
        <div class="screen-inner complete-card">
          <div class="sparkle">✨</div>
          <h2 id="complete-title">Level complete!</h2>
          <div id="complete-stars" class="stars-row"></div>
          <button id="foil-btn" class="pill-btn foil">
            <span id="foil-label">✨ Unlock foil pack</span>
            <span id="foil-badge" class="ad-badge on-pill">AD</span>
          </button>
          <div class="button-row">
            <button id="replay-btn" class="pill-btn secondary">Replay</button>
            <button id="next-btn" class="pill-btn primary">Next →</button>
          </div>
          <button id="menu-btn" class="text-link">All levels</button>
        </div>
      </div>

      <!-- Lightweight confirm dialog (rewarded-ad opt-in, etc.) -->
      <div id="confirm-overlay" class="confirm-overlay">
        <div class="confirm-card">
          <p id="confirm-text">Watch a short ad?</p>
          <div class="button-row">
            <button id="confirm-no" class="pill-btn secondary">No thanks</button>
            <button id="confirm-yes" class="pill-btn primary">Watch ad</button>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script type="module" src="/src/main.js"></script>
</body>
</html>
